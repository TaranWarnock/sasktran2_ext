name: CI

on:
  push:
    branches:
      - main
      - master
      - ci-build
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-24.04
            target: x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Build
        env:
          NCI: /usr/include
          NCL: /usr/lib
          FC: gfortran
        run: |
          sudo apt update && sudo apt install -y libnetcdff-dev gfortran
          cd build_scripts/MT_CKD
          make mtckd_static
          cd ../..
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        if: matrix.platform.target == 'x86_64'
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto
          before-script-linux: yum install -y netcdf-fortran-devel
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        if: matrix.platform.target == 'aarch64'
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto
          before-script-linux: yum install -y epel-release && yum install -y netcdf-fortran-devel
      - name: test wheel import
        run: |
          pip install --force-reinstall --verbose dist/*.whl
          python -c 'import sasktran2_ext'
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  linux-test-wheels:
    runs-on: ubuntu-24.04
    needs: linux
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: download wheels
        uses: actions/download-artifact@v7
        with:
          name: wheels-linux-x86_64
          path: dist

      - name: install wheels
        run: |
          pip install --force-reinstall --verbose dist/sasktran2_ext-*.whl pytest

      - name: run pytest
        run: |
          pytest .

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
    steps:
      - name: Install MSYS2 and NetCDF
        uses: msys2/setup-msys2@v2
        with:
          release: false
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-netcdf
            mingw-w64-x86_64-netcdf-fortran
            mingw-w64-x86_64-make
      - run: git config --global core.autocrlf input
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - name: Build
        env:
          NCI: C:/msys64/mingw64/include
          NCL: C:/msys64/mingw64/lib
          FC: C:/msys64/mingw64/bin/gfortran.exe
          MTCKD_LIB_NAME: mtckd.lib
        shell: msys2 {0}
        run: |
          pacman -U --noconfirm https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-hdf5-1.14.3-2-any.pkg.tar.zst
          pacman -U --noconfirm https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-netcdf-4.9.2-4-any.pkg.tar.zst
          pacman -U --noconfirm https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-libxml2-2.12.9-1-any.pkg.tar.zst
          cd build_scripts/MT_CKD
          make mtckd_shared
          cd ../..
          cd bin
          gendef mtckd.dll
          dlltool -d mtckd.def -l mtckd.lib
          cp mtckd.dll c:/msys64/mingw64/bin/
          cd ..
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          MTCKD_LIB_NAME: mtckd.lib
          RUST_BACKTRACE: full
          CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG: true
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Append msys root to path
        shell: bash
        run: |
          echo "PATH=$PATH:/c/msys64/mingw64/bin:bin" >> "$GITHUB_ENV"
      - name: delve wheels
        shell: bash -el {0}
        run: |
          pip install delvewheel
          delvewheel show dist/*whl
          delvewheel repair dist/*.whl
          rm -rf dist/*.whl
          mv wheelhouse/*.whl dist/
      - name: test wheel import
        shell: bash -el {0}
        run: |
          pip install --force-reinstall --verbose dist/*.whl
          python -c 'import sasktran2_ext'
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  windows-test-wheels:
    runs-on: windows-latest
    needs: windows
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: download wheels
        uses: actions/download-artifact@v7
        with:
          name: wheels-windows-x64
          path: dist

      - name: install wheels
        shell: bash -el {0}
        run: |
          pip install --force-reinstall --verbose dist/sasktran2_ext-*.whl pytest

      - name: run pytest
        run: |
          pytest .

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-15
            target: aarch64
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - uses: fortran-lang/setup-fortran@v1
        id: setup-fortran
        with:
          compiler: gcc
          version: 15
      - name: Install netcdf-fortran
        run: |
          brew install netcdf-fortran
      - name: Build
        if: matrix.platform.target == 'x86_64'
        env:
          FC: gfortran
          NCI: /usr/local/include
          NCL: /usr/local/lib
        run: |
          cd build_scripts/MT_CKD
          make mtckd_static
          cd ../..
      - name: Build
        if: matrix.platform.target == 'aarch64'
        env:
          FC: gfortran
          NCI: /opt/homebrew/include
          NCL: /opt/homebrew/lib
        run: |
          cd build_scripts/MT_CKD
          make mtckd_static
          cd ../..
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: delocate wheels
        run: |
          pip install delocate
          delocate-listdeps --depending dist/*.whl
          delocate-wheel dist/*.whl
          delocate-listdeps dist/*.whl
      - name: test wheel import
        run: |
          pip install --force-reinstall --verbose dist/*.whl
          python -c 'import sasktran2_ext'
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  upload_wheels:
    runs-on: ubuntu-latest
    needs: [windows, macos, linux, sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/sasktran2_ext
    permissions:
      id-token: write
    if: (github.event_name == 'release')
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          verbose: true
